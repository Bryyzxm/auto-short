# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - auto-short

on:
 push:
  branches:
   - main
 workflow_dispatch:

jobs:
 build:
  runs-on: ubuntu-latest
  permissions:
   contents: read #This is required for actions/checkout

  steps:
   - uses: actions/checkout@v4

   - name: Set up Node.js version
     uses: actions/setup-node@v3
     with:
      node-version: '20.x'
      cache: 'npm'
      cache-dependency-path: |
       package-lock.json
       backend/package-lock.json

   - name: Configure npm for rate limiting
     run: |
      npm config set registry https://registry.npmjs.org/
      npm config set fetch-timeout 600000
      npm config set fetch-retry-mintimeout 10000
      npm config set fetch-retry-maxtimeout 60000
      npm config set fetch-retries 5
      npm config set maxsockets 1

   - name: Clean npm cache
     run: npm cache clean --force

   - name: Install dependencies with retry strategy
     run: |
      # Function to retry npm install with exponential backoff
      retry_npm_install() {
        local dir=$1
        local max_attempts=3
        local attempt=1
        local delay=5
        
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt/$max_attempts for $dir..."
          if [ "$dir" = "." ]; then
            if npm install --no-audit --no-fund --prefer-offline; then
              echo "✅ Frontend dependencies installed successfully"
              return 0
            fi
          else
            cd "$dir"
            if npm install --no-audit --no-fund --prefer-offline; then
              echo "✅ Backend dependencies installed successfully"
              cd ..
              return 0
            fi
            cd ..
          fi
          
          echo "❌ Attempt $attempt failed, waiting ${delay}s..."
          sleep $delay
          delay=$((delay * 2))
          attempt=$((attempt + 1))
        done
        
        echo "❌ All attempts failed for $dir"
        return 1
      }

      # Install backend dependencies first (they're more critical)
      echo "🔧 Installing backend dependencies..."
      retry_npm_install "backend"

      # Wait between installs to avoid rate limiting
      echo "⏳ Waiting 10 seconds to avoid rate limiting..."
      sleep 10

      # Install frontend dependencies
      echo "🔧 Installing frontend dependencies..."
      retry_npm_install "."

   - name: Build project
     run: |
      echo "🏗️ Building project..."
      npm run build --if-present || echo "⚠️ No build script found, skipping..."

   - name: Run tests
     run: |
      echo "🧪 Running tests..."
      npm run test --if-present || echo "⚠️ No test script found, skipping..."

   - name: Upload artifact for deployment job
     uses: actions/upload-artifact@v4
     with:
      name: node-app
      path: .

 deploy:
  runs-on: ubuntu-latest
  needs: build
  permissions:
   id-token: write #This is required for requesting the JWT
   contents: read #This is required for actions/checkout

  env:
   AZURE_WEBAPP_NAME: 'auto-short'
   AZURE_RESOURCE_GROUP: 'auto-short-rg' # Update this if your resource group is different

  steps:
   - name: Download artifact from build job
     uses: actions/download-artifact@v4
     with:
      name: node-app

   - name: Login to Azure
     uses: azure/login@v2
     with:
      client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7C8EB305F5804697B200AFE3A4F86C59 }}
      tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E44F98F9E12A46C5BACCA781DE353BF9 }}
      subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_404426B66873449A857F58923A51028A }}

   - name: Stop Azure Web App to prevent deployment conflicts
     uses: Azure/cli@v2
     with:
      azcliversion: 2.53.0
      inlineScript: |
       echo "🛑 Stopping Azure Web App to prevent deployment conflicts..."
       # Check if app is already stopped
       STATUS=$(az webapp show --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "state" --output tsv)
       echo "Current app status: $STATUS"

       if [ "$STATUS" != "Stopped" ]; then
         echo "Stopping the web app..."
         az webapp stop --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}
         echo "✅ Web App stop command executed"
       else
         echo "✅ Web App is already stopped"
       fi

   - name: Wait for app to fully stop
     run: |
      echo "⏳ Waiting 15 seconds for app to fully stop and release locks..."
      sleep 15

   - name: Clear any deployment locks (if any)
     uses: Azure/cli@v2
     with:
      azcliversion: 2.53.0
      inlineScript: |
       echo "🔧 Checking for deployment locks..."
       # Add retry logic for Azure CLI commands
       for i in {1..3}; do
         echo "Attempt $i/3 to check deployment locks..."
         if az webapp deployment list-publishing-credentials --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --output none 2>/dev/null; then
           echo "✅ Lock check completed successfully"
           break
         else
           echo "⚠️ Lock check attempt $i failed, retrying..."
           if [ $i -lt 3 ]; then
             sleep 5
           fi
         fi
       done

   - name: 'Deploy to Azure Web App with retry logic'
     id: deploy-to-webapp
     uses: azure/webapps-deploy@v3
     with:
      app-name: ${{ env.AZURE_WEBAPP_NAME }}
      slot-name: 'Production'
      package: .
      clean: true # Clean deployment to avoid conflicts
     continue-on-error: true

   - name: Retry deployment if first attempt failed
     if: steps.deploy-to-webapp.outcome == 'failure'
     uses: azure/webapps-deploy@v3
     with:
      app-name: ${{ env.AZURE_WEBAPP_NAME }}
      slot-name: 'Production'
      package: .
      clean: true

   - name: Start Azure Web App after deployment
     uses: Azure/cli@v2
     with:
      azcliversion: 2.53.0
      inlineScript: |
       echo "🚀 Starting Azure Web App after deployment..."
       # Add retry logic for starting the app
       for i in {1..3}; do
         echo "Attempt $i/3 to start the web app..."
         if az webapp start --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}; then
           echo "✅ Web App started successfully"
           break
         else
           echo "⚠️ Start attempt $i failed, retrying..."
           if [ $i -lt 3 ]; then
             sleep 10
           fi
         fi
       done

   - name: Verify and set startup command
     uses: Azure/cli@v2
     with:
      azcliversion: 2.53.0
      inlineScript: |
       echo "🔧 Verifying startup command..."
       # Add retry logic for configuration commands
       for i in {1..3}; do
         echo "Attempt $i/3 to check startup command..."
         if CURRENT_STARTUP=$(az webapp config show --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "appCommandLine" --output tsv 2>/dev/null); then
           echo "Current startup command: '$CURRENT_STARTUP'"
           break
         else
           echo "⚠️ Config check attempt $i failed, retrying..."
           if [ $i -lt 3 ]; then
             sleep 5
           fi
         fi
       done

       EXPECTED_STARTUP="bash backend/startup.sh"
       if [ "$CURRENT_STARTUP" != "$EXPECTED_STARTUP" ]; then
         echo "⚠️ Startup command mismatch! Setting correct startup command..."
         # Retry logic for setting startup command
         for i in {1..3}; do
           echo "Attempt $i/3 to set startup command..."
           if az webapp config set --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --startup-file "$EXPECTED_STARTUP"; then
             echo "✅ Startup command updated to: $EXPECTED_STARTUP"
             break
           else
             echo "⚠️ Startup command update attempt $i failed, retrying..."
             if [ $i -lt 3 ]; then
               sleep 5
             fi
           fi
         done
         
         echo "🔄 Restarting app to apply startup command..."
         for i in {1..3}; do
           echo "Attempt $i/3 to restart the app..."
           if az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}; then
             echo "✅ App restarted"
             break
           else
             echo "⚠️ Restart attempt $i failed, retrying..."
             if [ $i -lt 3 ]; then
               sleep 10
             fi
           fi
         done
       else
         echo "✅ Startup command is already correct"
       fi

   - name: Wait for app to fully start and verify deployment
     run: |
      echo "⏳ Waiting 45 seconds for app to fully start..."
      sleep 45
      echo "🔍 Checking app health..."

      # Try health check multiple times
      for i in {1..3}; do
        echo "Health check attempt $i/3..."
        if curl -f -s "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health" > /dev/null; then
          echo "✅ Health check passed!"
          curl -s "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health" | head -10
          break
        else
          echo "⚠️ Health check failed, waiting 15 seconds..."
          if [ $i -lt 3 ]; then
            sleep 15
          fi
        fi
      done
